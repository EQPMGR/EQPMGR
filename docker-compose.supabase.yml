services:
  # PostgreSQL Database
  postgres:
    image: postgres:15-alpine
    container_name: eqpmgr_postgres
    environment:
      POSTGRES_DB: postgres
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./supabase/migrations:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - eqpmgr_network

  # Redis for caching
  redis:
    image: redis:7-alpine
    container_name: eqpmgr_redis
    ports:
      - "6380:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - eqpmgr_network

  # PostgREST API Server - generates REST API from postgres
  postgrest:
    image: postgrest/postgrest:v12.0.1
    container_name: eqpmgr_postgrest
    ports:
      - "8001:3000"
    environment:
      PGRST_DB_URI: "postgresql://postgres:postgres@postgres:5432/postgres"
      PGRST_DB_SCHEMA: "public"
      PGRST_DB_ANON_ROLE: "anon"
      PGRST_JWT_SECRET: "your-secret-jwt-key-min-32-chars-long!"
      PGRST_OPENAPI_SERVER_PROXY_URL: "http://localhost:8001"
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - eqpmgr_network
    healthcheck:
      test: ["CMD", "sh", "-c", "curl -s http://localhost:3000/ || true"]
      interval: 10s
      timeout: 10s
      retries: 3
      start_period: 5s

  # Next.js Application
  app:
    build:
      context: .
      dockerfile: Dockerfile.dev
    container_name: eqpmgr_app
    ports:
      - "3006:3000"
    environment:
      NODE_ENV: development
      NEXT_PUBLIC_BACKEND_PROVIDER: supabase
      
      # Supabase Configuration (direct to local postgres)
      NEXT_PUBLIC_SUPABASE_URL: http://localhost:8001
      NEXT_PUBLIC_SUPABASE_ANON_KEY: your_supabase_anon_key_here
      SUPABASE_SERVICE_ROLE_KEY: your_service_role_key_here
      SUPABASE_DB_URL: postgresql://postgres:postgres@postgres:5432/postgres

      # Database
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: postgres
      
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    
    volumes:
      - .:/app
      - /app/node_modules
    
    networks:
      - eqpmgr_network

networks:
  eqpmgr_network:
    driver: bridge

volumes:
  postgres_data:
